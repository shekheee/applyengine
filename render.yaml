# Backend deploy for ApplyEngine (Render).
# Frontend deploys separately to Vercel at applyengine.ajayshekhawat.uk.
services:
  - type: web
    name: applyengine-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt && PLAYWRIGHT_BROWSERS_PATH=/opt/render/project/src/backend/pw-browsers python -m playwright install chromium
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src/backend/pw-browsers
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_CHAT_MODEL
        value: gpt-5.5
      - key: ANTHROPIC_COACH_MODEL
        value: claude-opus-4-8
      - key: GEMINI_COACH_MODEL
        value: gemini-3.1-pro-preview
      - key: COACH_PROVIDER_CHAIN
        value: openai,anthropic,gemini
      - key: MEMORY_MODEL
        value: claude-opus-4-8
      - key: OPENAI_EMBED_MODEL
        value: text-embedding-3-small
      - key: CORS_ORIGINS
        value: https://applyengine.ajayshekhawat.uk,https://applyengine.vercel.app,http://localhost:3000
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SIGNUP_CODE
        sync: false
