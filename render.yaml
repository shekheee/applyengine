# Backend deploy for ApplyEngine (Render).
# Frontend deploys separately to Vercel at applyengine.ajayshekhawat.uk.
# Mirrors the personal-portfolio (RAG Agent) setup.
services:
  - type: web
    name: applyengine-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_CHAT_MODEL
        value: gpt-4o-mini
      - key: OPENAI_EMBED_MODEL
        value: text-embedding-3-small
      - key: CORS_ORIGINS
        value: https://applyengine.ajayshekhawat.uk
      # Persistent Postgres so accounts + coach memory survive redeploys/sleep.
      # Set to the managed Postgres connection string in the Render dashboard.
      - key: DATABASE_URL
        sync: false
      # Secrets — set in the Render dashboard (sync: false keeps them out of git).
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # Long random string used to sign login tokens (JWT).
      - key: JWT_SECRET
        sync: false
      # If set, new sign-ups must provide this code (protects the API bill).
      - key: SIGNUP_CODE
        sync: false
