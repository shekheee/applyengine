# Backend deploy for ApplyEngine (Render).
# Frontend deploys separately to Vercel at applyengine.ajayshekhawat.uk.
# Uses Docker so Playwright/Chromium is available for high-fidelity A4 resume PDFs.
services:
  - type: web
    name: applyengine-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_CHAT_MODEL
        value: gpt-5.5
      - key: ANTHROPIC_COACH_MODEL
        value: claude-opus-4-8
      - key: GEMINI_COACH_MODEL
        value: gemini-3.1-pro-preview
      - key: COACH_PROVIDER_CHAIN
        value: openai,anthropic,gemini
      - key: MEMORY_MODEL
        value: claude-opus-4-8
      - key: OPENAI_EMBED_MODEL
        value: text-embedding-3-small
      - key: CORS_ORIGINS
        value: https://applyengine.ajayshekhawat.uk,https://applyengine.vercel.app,http://localhost:3000
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SIGNUP_CODE
        sync: false
