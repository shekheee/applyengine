# Render's GitHub webhook was not firing for this service (all deploys showed
# trigger=api). This workflow triggers a Render deploy on every push to main
# so backend changes go live without manual API calls.
name: Deploy Render backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "render.yaml"
      - ".github/workflows/render-deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: srv-d93hhitaeets73dob9vg
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "::error::RENDER_API_KEY secret is not set — add it in GitHub repo Settings → Secrets"
            exit 1
          fi
          resp=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}')
          body=$(echo "$resp" | head -n -1)
          code=$(echo "$resp" | tail -n 1)
          echo "$body"
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "::error::Render deploy trigger failed (HTTP $code)"
            exit 1
          fi
          echo "Render deploy triggered successfully"
